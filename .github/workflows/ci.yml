name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    name: Contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: esusu-contract
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: esusu-contract
      - run: cargo test
      - run: cargo build --target wasm32-unknown-unknown --release

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: esusu
          POSTGRES_PASSWORD: esusu
          POSTGRES_DB: esusu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://esusu:esusu@localhost:5432/esusu_test
      STELLAR_NETWORK: futurenet
      STELLAR_HORIZON_URL: https://horizon-futurenet.stellar.org
      STELLAR_RPC_URL: https://rpc-futurenet.stellar.org
      STELLAR_NETWORK_PASSPHRASE: "Test SDF Future Network ; October 2022"
      STELLAR_SERVER_SECRET_KEY: ${{ secrets.STELLAR_SERVER_SECRET_KEY }}
      USDC_ISSUER: ${{ secrets.USDC_ISSUER }}
      TWILIO_ACCOUNT_SID: test
      TWILIO_AUTH_TOKEN: test
      TWILIO_FROM_NUMBER: "+10000000000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run migrate
      - run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
